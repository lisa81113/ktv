<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行動KTV 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --gold-dark: #B8860B;
  --bg-dark: #0d0800;
  --bg-mid: #1e0e00;
  --bg-card: #2e1800;
  --text-bright: #fff8e7;
  --text-dim: #c8a96e;
  --accent: #ff6b35;
  --lyric-size: 2.6rem;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-dark); color: var(--text-bright); overflow-x: hidden; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #2a0800, #5a1800);
  border-bottom: 3px solid var(--gold);
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: center;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 3px 20px rgba(0,0,0,0.7);
}
.header-title { font-size: 1.8rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); letter-spacing: 4px; }
.header-title span { color: var(--accent); }

/* TABS */
.nav-tabs { display: flex; background: var(--bg-mid); border-bottom: 2px solid var(--gold-dark); position: sticky; top: 58px; z-index: 100; }
.nav-tab { flex: 1; padding: 13px 6px; text-align: center; font-size: 1rem; font-weight: 700; color: var(--text-dim); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; user-select: none; }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(255,215,0,0.07); }

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* ══ PLAY PANEL ══ */

/* YouTube embed container */
.yt-container {
  width: 100%;
  background: #000;
  border-bottom: 3px solid var(--gold-dark);
  position: relative;
}
/* 16:9 ratio wrapper */
.yt-ratio {
  position: relative;
  padding-top: 56.25%; /* 16:9 */
  background: #000;
}
.yt-ratio iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.yt-idle-overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 40% 60%, #1a003a 0%, #000 65%);
  gap: 12px; text-align: center; padding: 20px;
  z-index: 2;
}
.yt-idle-overlay .mic { font-size: 4rem; }
.yt-idle-overlay .idle-txt { font-size: 1.15rem; color: var(--text-dim); line-height: 1.6; }

/* Error overlay */
.yt-error-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.9);
  gap: 10px; text-align: center; padding: 16px;
  z-index: 3;
}
.yt-error-overlay .err-icon { font-size: 2.5rem; }
.yt-error-overlay .err-txt { font-size: 0.95rem; color: #ffaaaa; line-height: 1.6; }
.yt-open-link {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #cc0000, #ff2222);
  color: white; font-size: 1rem; font-weight: 700;
  padding: 11px 20px; border-radius: 12px; border: none;
  cursor: pointer; font-family: inherit; text-decoration: none;
  margin-top: 4px;
}

/* Now playing bar */
.np-bar {
  display: none;
  background: var(--bg-card);
  border-bottom: 1px solid var(--gold-dark);
  padding: 9px 14px;
  align-items: center; gap: 12px;
}
.np-disc {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  background: conic-gradient(var(--gold), var(--accent), var(--gold-dark), var(--gold));
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  animation: spin 3s linear infinite; animation-play-state: paused;
}
.np-disc.spin { animation-play-state: running; }
@keyframes spin { to { transform: rotate(360deg); } }
.np-info { flex: 1; min-width: 0; }
.np-name { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 0.85rem; color: var(--text-dim); }
.np-time { font-size: 0.8rem; color: var(--text-dim); flex-shrink: 0; font-weight: 700; }

/* LYRIC BOX */
.lyric-box {
  background: linear-gradient(180deg, #080200 0%, #150800 100%);
  padding: 16px 14px 12px;
  min-height: 140px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-bottom: 2px solid var(--gold-dark);
  cursor: pointer;
  user-select: none;
}
.lyric-tap-hint { font-size: 0.72rem; color: rgba(255,255,255,0.18); margin-bottom: 4px; }
.lyric-prev, .lyric-next { font-size: calc(var(--lyric-size) * 0.52); color: rgba(255,255,255,0.25); line-height: 1.6; text-align: center; min-height: 1.5em; transition: all 0.3s; }
.lyric-curr {
  font-size: var(--lyric-size); font-weight: 900; color: var(--gold);
  text-align: center; line-height: 1.4;
  text-shadow: 0 0 30px rgba(255,215,0,0.85), 0 2px 8px rgba(0,0,0,0.9);
  margin: 8px 0; letter-spacing: 3px; min-height: 1.4em;
  transition: opacity 0.25s;
}
.lyric-progress { width: 90%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.lyric-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent)); border-radius: 3px; transition: width 0.4s linear; }
.lyric-counter { font-size: 0.7rem; color: rgba(255,255,255,0.18); margin-top: 4px; }

/* CONTROLS */
.controls-area { padding: 11px 13px; background: var(--bg-mid); }
.ctrl-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.ctrl-btn { padding: 13px 5px; border: none; border-radius: 12px; font-family: inherit; font-weight: 700; font-size: 0.82rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.15s; user-select: none; }
.ctrl-btn:active { transform: scale(0.92); }
.ctrl-btn .ci { font-size: 1.45rem; }
.c-prev, .c-next { background: var(--bg-card); border: 1px solid var(--gold-dark); color: var(--gold); }
.c-pp { background: linear-gradient(135deg, var(--gold), #d4940a); color: #1a0a00; }
.c-stop { background: linear-gradient(135deg, #7a0000, #c0392b); color: #fff; }

/* Settings */
.setting-row { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 11px 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 9px; flex-wrap: wrap; }
.setting-label { font-size: 0.88rem; color: var(--text-dim); flex-shrink: 0; }
.opt-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.opt-btn { padding: 7px 12px; border-radius: 8px; border: 2px solid var(--gold-dark); background: transparent; color: var(--gold); font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; user-select: none; transition: all 0.15s; }
.opt-btn.active { background: var(--gold); color: #1a0a00; border-color: var(--gold); }

/* Section title */
.section-title { font-size: 1rem; font-weight: 700; color: var(--gold); margin: 10px 0 8px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content:''; flex:1; height:1px; background: var(--gold-dark); }

/* ══ SEARCH/FAV/QUEUE PANELS ══ */
#panel-search, #panel-fav, #panel-queue { padding: 13px; }
.search-row { display: flex; gap: 8px; margin-bottom: 13px; }
.search-input { flex: 1; padding: 13px; font-size: 1.1rem; font-family: inherit; background: var(--bg-card); border: 2px solid var(--gold-dark); border-radius: 12px; color: var(--text-bright); outline: none; }
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--text-dim); }
.btn { padding: 13px 17px; font-size: 1rem; font-family: inherit; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: all 0.15s; user-select: none; }
.btn:active { transform: scale(0.94); }
.btn-gold { background: linear-gradient(135deg, var(--gold), #d4940a); color: #1a0a00; }
.btn-red { background: linear-gradient(135deg, #8b0000, #c0392b); color: #fff; }

.artist-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 13px; }
.artist-chip { padding: 8px 15px; background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 20px; font-size: 0.93rem; color: var(--text-dim); cursor: pointer; user-select: none; transition: all 0.15s; }
.artist-chip.active { background: var(--gold); color: #1a0a00; font-weight: 700; border-color: var(--gold); }

/* Song list */
.song-list { display: flex; flex-direction: column; gap: 9px; }
.song-item { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 13px; padding: 12px 13px; display: flex; align-items: center; gap: 9px; transition: all 0.15s; }
.song-item.playing { border-color: var(--gold); background: rgba(255,215,0,0.08); box-shadow: 0 0 14px rgba(255,215,0,0.18); }
.song-num { font-size: 0.9rem; color: var(--text-dim); min-width: 24px; text-align: center; font-weight: 700; }
.song-info { flex: 1; cursor: pointer; }
.song-name { font-size: 1.08rem; font-weight: 700; margin-bottom: 2px; }
.song-artist { font-size: 0.88rem; color: var(--text-dim); }
.song-actions { display: flex; gap: 6px; }
.icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.15rem; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; transition: all 0.15s; }
.icon-btn:active { transform: scale(0.88); }
.fav-btn { background: rgba(255,80,80,0.15); color: #ff7777; }
.fav-btn.on { background: rgba(255,80,80,0.3); color: #ff2222; }
.add-btn { background: rgba(255,165,0,0.15); color: #ffa500; }
.play-btn { background: rgba(255,215,0,0.15); color: var(--gold); }

/* Queue */
.queue-item { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 11px; padding: 11px 12px; display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.q-num { width: 26px; height: 26px; background: var(--gold); color: #1a0a00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; flex-shrink: 0; }

.empty-state { text-align: center; padding: 36px 20px; color: var(--text-dim); font-size: 1rem; }
.empty-icon { font-size: 2.8rem; display: block; margin-bottom: 10px; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(14px); background: rgba(255,215,0,0.97); color: #1a0a00; padding: 10px 22px; border-radius: 28px; font-size: 0.95rem; font-weight: 700; opacity: 0; transition: all 0.26s; z-index: 999; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 18px rgba(0,0,0,0.5); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🎤 行動<span>KTV</span></div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('play')">🎵 唱歌</div>
  <div class="nav-tab" onclick="switchTab('search')">🔍 搜尋</div>
  <div class="nav-tab" onclick="switchTab('fav')">❤️ 最愛</div>
  <div class="nav-tab" onclick="switchTab('queue')">📋 點歌</div>
</div>

<!-- ══ 唱歌 ══ -->
<div class="panel active" id="panel-play">

  <!-- YouTube 內嵌 -->
  <div class="yt-container">
    <div class="yt-ratio" id="yt-ratio">
      <!-- idle -->
      <div class="yt-idle-overlay" id="yt-idle">
        <span class="mic">🎤</span>
        <div class="idle-txt">請到「搜尋」選一首歌<br>開始演唱！</div>
      </div>
      <!-- error -->
      <div class="yt-error-overlay" id="yt-error">
        <span class="err-icon">⚠️</span>
        <div class="err-txt">此影片不允許嵌入播放<br>請點下方按鈕在 YouTube 開啟</div>
        <a id="yt-fallback-link" class="yt-open-link" href="#" target="_blank">▶ 開啟 YouTube 播放</a>
      </div>
      <!-- player div -->
      <div id="yt-player"></div>
    </div>
  </div>

  <!-- Now playing -->
  <div class="np-bar" id="np-bar">
    <div class="np-disc" id="np-disc">🎵</div>
    <div class="np-info">
      <div class="np-name" id="np-name">-</div>
      <div class="np-artist" id="np-artist-bar">-</div>
    </div>
    <div class="np-time" id="np-time">0:00</div>
  </div>

  <!-- 歌詞區（點擊可手動換行） -->
  <div class="lyric-box" onclick="manualNextLyric()" id="lyric-box">
    <div class="lyric-tap-hint" id="lyric-tap-hint"></div>
    <div class="lyric-prev" id="lyric-prev"></div>
    <div class="lyric-curr" id="lyric-curr" style="color:var(--text-dim);font-size:1.3rem;">請先選一首歌 🎶</div>
    <div class="lyric-next" id="lyric-next"></div>
    <div class="lyric-progress" id="lyric-progress" style="display:none">
      <div class="lyric-fill" id="lyric-fill" style="width:0%"></div>
    </div>
    <div class="lyric-counter" id="lyric-counter"></div>
  </div>

  <!-- 控制 -->
  <div class="controls-area">
    <div class="ctrl-row">
      <button class="ctrl-btn c-prev" onclick="playPrev()"><span class="ci">⏮</span>上一首</button>
      <button class="ctrl-btn c-pp" id="pp-btn" onclick="togglePause()"><span class="ci" id="pp-icon">▶</span><span id="pp-label">播放</span></button>
      <button class="ctrl-btn c-next" onclick="playNext()"><span class="ci">⏭</span>下一首</button>
      <button class="ctrl-btn c-stop" onclick="stopSong()"><span class="ci">⏹</span>停止</button>
    </div>

    <!-- 歌詞大小 -->
    <div class="setting-row">
      <span class="setting-label">🔤 歌詞大小</span>
      <div class="opt-btns">
        <button class="opt-btn" onclick="setSize('1.8rem')">小</button>
        <button class="opt-btn active" onclick="setSize('2.6rem')">中</button>
        <button class="opt-btn" onclick="setSize('3.4rem')">大</button>
        <button class="opt-btn" onclick="setSize('4.2rem')">特大</button>
      </div>
    </div>

    <!-- 待唱歌單 -->
    <div class="section-title">📋 待唱歌單</div>
    <div id="queue-preview-area"></div>
  </div>
</div>

<!-- ══ 搜尋 ══ -->
<div class="panel" id="panel-search">
  <div class="section-title">🔍 輸入歌名或歌手</div>
  <div class="search-row">
    <input class="search-input" id="search-input" type="text" placeholder="輸入歌名或歌手名稱..." oninput="doSearch()">
    <button class="btn btn-gold" onclick="doSearch()">搜尋</button>
  </div>
  <div class="section-title">🎤 快速選歌手</div>
  <div class="artist-chips" id="artist-chips"></div>
  <div class="section-title">🎵 歌曲列表</div>
  <div class="song-list" id="search-list"></div>
</div>

<!-- ══ 最愛 ══ -->
<div class="panel" id="panel-fav">
  <div class="section-title">❤️ 我的最愛歌單</div>
  <div class="song-list" id="fav-list"></div>
</div>

<!-- ══ 點歌 ══ -->
<div class="panel" id="panel-queue">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div class="section-title" style="margin:0;flex:1;">📋 點歌列表</div>
    <button class="btn btn-red" onclick="clearQueue()" style="padding:9px 13px;font-size:0.88rem;">清空</button>
  </div>
  <div id="queue-full-list"></div>
</div>

<div class="toast" id="toast"></div>

  // ── 鄧麗君 ──
  {
    id:16, name:'月亮代表我的心', artist:'鄧麗君', lang:'國語',

    lyrics:['你問我愛你有多深','我愛你有幾分','我的情也真','我的愛也真',
      '月亮代表我的心','你問我愛你有多深','我愛你有幾分',
      '你去想一想','你去看一看','月亮代表我的心'],
    lyricSec:[5,9,13,16,20,30,34,38,41,45]
  },
  {
    id:17, name:'甜蜜蜜', artist:'鄧麗君', lang:'國語',
    ytId:'qMaWhkellHo',
    lyrics:['甜蜜蜜你笑得甜蜜蜜','好像花兒開在春風裡','開在春風裡',
      '在哪裡在哪裡見過你','你的笑容這樣熟悉','我一時想不起',
      '啊～在夢裡','夢裡夢裡見過你','甜蜜笑得多甜蜜'],
    lyricSec:[4,8,12,18,22,26,30,33,37]
  },
  // ── 葉啟田 ──
  {
    id:18, name:'愛拼才會贏', artist:'葉啟田', lang:'台語',
    ytId:'KAONKDpgEwg',
    lyrics:['一時失志不免怨嘆','一時落魄不免膽寒','那通失去希望','每日醉茫茫',
      '無魂有體親像稻草人','人生可比是海上的波浪','有時起有時落',
      '好運歹運 總嘛要照起工來行','三分天注定','七分靠打拼','愛拼才會贏！'],
    lyricSec:[4,8,12,16,20,25,29,33,39,43,47]
  },
];

const ARTISTS = ['劉歡','潘美辰','林良樂','余天','蘇芮','張惠妹','鄭怡','鳳飛飛'];

/* ── State ── */
let queue = [];
let favorites = [];
try { favorites = JSON.parse(localStorage.getItem('ktv_fav4')||'[]'); } catch(e){}
let currentSong = null;
let ytPlayer = null;
let ytReady = false;
let pendingPlay = null;
let syncTimer = null;
let lastLyricIdx = -1;

/* ═══════════════════════════════════
   YouTube IFrame API
═══════════════════════════════════ */
(function(){
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  // Create a hidden player first to initialise the API
  ytPlayer = new YT.Player('yt-player', {
    height:'100%', width:'100%',
    videoId:'',
    playerVars:{ autoplay:0, controls:1, rel:0, playsinline:1, modestbranding:1, origin: location.origin },
    events:{
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange,
      onError: onPlayerError
    }
  });
};

function onPlayerReady(e) {
  if (pendingPlay) { loadAndPlay(pendingPlay); pendingPlay = null; }
}

function onPlayerStateChange(e) {
  const s = e.data;
  if (s === YT.PlayerState.PLAYING) {
    document.getElementById('pp-icon').textContent = '⏸';
    document.getElementById('pp-label').textContent = '暫停';
    document.getElementById('np-disc').classList.add('spin');
    document.getElementById('yt-error').style.display = 'none';
    startSyncTimer();
  } else if (s === YT.PlayerState.PAUSED) {
    document.getElementById('pp-icon').textContent = '▶';
    document.getElementById('pp-label').textContent = '播放';
    document.getElementById('np-disc').classList.remove('spin');
  } else if (s === YT.PlayerState.ENDED) {
    document.getElementById('np-disc').classList.remove('spin');
    stopSyncTimer();
    setTimeout(playNext, 1200);
  } else if (s === YT.PlayerState.BUFFERING) {
    // keep spinner
  }
}

function onPlayerError(e) {
  // Error codes 100,101,150 = embedding not allowed
  console.log('YT error:', e.data);
  showEmbedError();
}

function showEmbedError() {
  if (!currentSong) return;
  const err = document.getElementById('yt-error');
  err.style.display = 'flex';
  const link = document.getElementById('yt-fallback-link');
  link.href = 'https://www.youtube.com/watch?v=' + currentSong.ytId;
  stopSyncTimer();
}

/* ═══════════════════════════════════
   Play logic
═══════════════════════════════════ */
function playSong(id) {
  const song = SONGS.find(s=>s.id===id);
  if (!song) return;

  currentSong = song;
  lastLyricIdx = -1;
  stopSyncTimer();

  // Update UI immediately
  document.getElementById('np-bar').style.display = 'flex';
  document.getElementById('np-name').textContent = song.name;
  document.getElementById('np-artist-bar').textContent = song.artist + ' · ' + song.lang;
  document.getElementById('lyric-progress').style.display = 'block';
  document.getElementById('lyric-tap-hint').textContent = '👆 點擊歌詞區可手動換行';
  document.getElementById('yt-idle').style.display = 'none';
  document.getElementById('yt-error').style.display = 'none';
  document.getElementById('pp-icon').textContent = '⏸';
  document.getElementById('pp-label').textContent = '暫停';

  renderLyricAt(0);

  if (!ytReady || !ytPlayer) {
    pendingPlay = song;
    showToast('⏳ 載入中...');
    return;
  }
  loadAndPlay(song);
  switchTab('play');
  showToast('🎵 ' + song.name);
}

function loadAndPlay(song) {
  document.getElementById('yt-error').style.display = 'none';
  ytPlayer.loadVideoById({ videoId: song.ytId, startSeconds: 0 });
}

/* ═══════════════════════════════════
   Lyric sync — polls YT current time
═══════════════════════════════════ */
function startSyncTimer() {
  stopSyncTimer();
  syncTimer = setInterval(() => {
    if (!currentSong || !ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;

    const sec = ytPlayer.getCurrentTime();

    // Update time display
    document.getElementById('np-time').textContent = formatTime(sec);

    // Find current lyric index based on video time
    const times = currentSong.lyricSec;
    let idx = 0;
    for (let i = 0; i < times.length; i++) {
      if (sec >= times[i]) idx = i; else break;
    }

    if (idx !== lastLyricIdx) {
      lastLyricIdx = idx;
      renderLyricAt(idx);
    }
  }, 200);
}

function stopSyncTimer() {
  if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
}

function renderLyricAt(idx) {
  if (!currentSong) return;
  const L = currentSong.lyrics;
  const i = Math.min(idx, L.length - 1);
  document.getElementById('lyric-prev').textContent = i > 0 ? L[i-1] : '';
  const curr = document.getElementById('lyric-curr');
  curr.textContent = L[i] || '';
  curr.style.color = 'var(--gold)';
  curr.style.fontSize = 'var(--lyric-size)';
  document.getElementById('lyric-next').textContent = i < L.length-1 ? L[i+1] : '';
  const pct = Math.round(((i+1)/L.length)*100);
  document.getElementById('lyric-fill').style.width = pct + '%';
  document.getElementById('lyric-counter').textContent = (i+1) + ' / ' + L.length + ' 句';
}

// Manual lyric advance (tap lyric area)
function manualNextLyric() {
  if (!currentSong) return;
  const next = Math.min(lastLyricIdx + 1, currentSong.lyrics.length - 1);
  lastLyricIdx = next;
  renderLyricAt(next);
}

function togglePause() {
  if (!currentSong || !ytPlayer) { showToast('請先選一首歌！'); return; }
  const s = ytPlayer.getPlayerState();
  if (s === YT.PlayerState.PLAYING) { ytPlayer.pauseVideo(); }
  else { ytPlayer.playVideo(); }
}

function stopSong() {
  stopSyncTimer();
  if (ytPlayer && typeof ytPlayer.stopVideo === 'function') { try{ytPlayer.stopVideo();}catch(e){} }
  currentSong = null; lastLyricIdx = -1;
  document.getElementById('np-bar').style.display = 'none';
  document.getElementById('np-disc').classList.remove('spin');
  document.getElementById('np-time').textContent = '0:00';
  document.getElementById('yt-idle').style.display = 'flex';
  document.getElementById('yt-error').style.display = 'none';
  document.getElementById('lyric-prev').textContent = '';
  const curr = document.getElementById('lyric-curr');
  curr.textContent = '請先選一首歌 🎶';
  curr.style.color = 'var(--text-dim)'; curr.style.fontSize = '1.3rem';
  document.getElementById('lyric-next').textContent = '';
  document.getElementById('lyric-fill').style.width = '0%';
  document.getElementById('lyric-counter').textContent = '';
  document.getElementById('lyric-progress').style.display = 'none';
  document.getElementById('lyric-tap-hint').textContent = '';
  document.getElementById('pp-icon').textContent = '▶';
  document.getElementById('pp-label').textContent = '播放';
  showToast('⏹ 已停止');
}

function playNext() {
  if (queue.length > 0) {
    const nxt = queue.shift(); renderQueueFull(); renderQueuePreview(); playSong(nxt.id);
  } else if (currentSong) {
    const idx = SONGS.findIndex(s=>s.id===currentSong.id);
    playSong(SONGS[(idx+1)%SONGS.length].id);
  }
}
function playPrev() {
  if (!currentSong) return;
  const idx = SONGS.findIndex(s=>s.id===currentSong.id);
  playSong(SONGS[(idx-1+SONGS.length)%SONGS.length].id);
}

function formatTime(sec) {
  sec = Math.floor(sec);
  return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
}

/* ── Font size ── */
function setSize(sz) {
  document.documentElement.style.setProperty('--lyric-size', sz);
  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.classList.toggle('active', ['1.8rem','2.6rem','3.4rem','4.2rem'][i] === sz);
  });
  if (currentSong) renderLyricAt(lastLyricIdx < 0 ? 0 : lastLyricIdx);
}

/* ── Favorites ── */
function toggleFav(id) {
  if (favorites.includes(id)) { favorites=favorites.filter(f=>f!==id); showToast('已移除最愛'); }
  else { favorites.push(id); showToast('❤️ 已加入最愛！'); }
  try{localStorage.setItem('ktv_fav4',JSON.stringify(favorites));}catch(e){}
  renderFavList(); doSearch();
}

/* ── Queue ── */
function addToQueue(id) {
  const song=SONGS.find(s=>s.id===id); if(!song) return;
  if(queue.find(s=>s.id===id)){showToast('已在點歌列表中');return;}
  queue.push(song); renderQueueFull(); renderQueuePreview();
  showToast('➕ 已加入：'+song.name);
}
function removeQueue(i){queue.splice(i,1);renderQueueFull();renderQueuePreview();}
function clearQueue(){queue=[];renderQueueFull();renderQueuePreview();showToast('已清空點歌列表');}

/* ── Render ── */
function songItemHTML(s, num) {
  const isFav = favorites.includes(s.id);
  const isNP = currentSong && currentSong.id === s.id;
  return `<div class="song-item ${isNP?'playing':''}">
    <div class="song-num">${isNP?'🎵':num}</div>
    <div class="song-info" onclick="playSong(${s.id})">
      <div class="song-name">${s.name}</div>
      <div class="song-artist">${s.artist} · ${s.lang}</div>
    </div>
    <div class="song-actions">
      <button class="icon-btn fav-btn ${isFav?'on':''}" onclick="toggleFav(${s.id})">${isFav?'❤️':'🤍'}</button>
      <button class="icon-btn add-btn" onclick="addToQueue(${s.id})">➕</button>
      <button class="icon-btn play-btn" onclick="playSong(${s.id})">▶</button>
    </div>
  </div>`;
}
function renderSongList(songs,elId){
  document.getElementById(elId).innerHTML=songs.length
    ?songs.map((s,i)=>songItemHTML(s,i+1)).join('')
    :'<div class="empty-state"><span class="empty-icon">😔</span>找不到相關歌曲</div>';
}
function renderFavList(){
  const favS=SONGS.filter(s=>favorites.includes(s.id));
  document.getElementById('fav-list').innerHTML=favS.length
    ?favS.map((s,i)=>songItemHTML(s,i+1)).join('')
    :'<div class="empty-state"><span class="empty-icon">💝</span>還沒有最愛歌曲<br>按歌曲旁的 🤍 加入！</div>';
}
function renderQueueFull(){
  document.getElementById('queue-full-list').innerHTML=queue.length
    ?queue.map((s,i)=>`<div class="queue-item">
        <div class="q-num">${i+1}</div>
        <div class="song-info"><div class="song-name">${s.name}</div><div class="song-artist">${s.artist}</div></div>
        <button class="icon-btn" style="background:rgba(200,0,0,0.15);color:#ff6666;" onclick="removeQueue(${i})">✕</button>
      </div>`).join('')
    :'<div class="empty-state"><span class="empty-icon">🎶</span>點歌列表是空的<br>去搜尋歌曲並按 ➕ 加入！</div>';
}
function renderQueuePreview(){
  const el=document.getElementById('queue-preview-area');
  if(!queue.length){el.innerHTML='<div style="color:var(--text-dim);font-size:0.9rem;text-align:center;padding:8px;">點歌列表是空的</div>';return;}
  el.innerHTML=queue.slice(0,3).map((s,i)=>`<div class="queue-item">
    <div class="q-num">${i+1}</div>
    <div class="song-info"><div class="song-name">${s.name}</div><div class="song-artist">${s.artist}</div></div>
  </div>`).join('')+(queue.length>3?`<div style="text-align:center;color:var(--text-dim);font-size:0.85rem;padding:6px;">還有 ${queue.length-3} 首...</div>`:'');
}
function renderArtistChips(){
  document.getElementById('artist-chips').innerHTML=ARTISTS.map(a=>
    `<div class="artist-chip" onclick="filterArtist('${a}')">${a}</div>`).join('');
}
function filterArtist(a){
  document.querySelectorAll('.artist-chip').forEach(c=>c.classList.toggle('active',c.textContent===a));
  document.getElementById('search-input').value=a;
  renderSongList(SONGS.filter(s=>s.artist===a),'search-list');
}
let lastQ='';
function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  lastQ=q;
  document.querySelectorAll('.artist-chip').forEach(c=>c.classList.remove('active'));
  renderSongList(q?SONGS.filter(s=>s.name.includes(q)||s.artist.includes(q)):SONGS,'search-list');
}
function switchTab(tab){
  ['play','search','fav','queue'].forEach((t,i)=>{
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='fav') renderFavList();
  if(tab==='queue') renderQueueFull();
  if(tab==='search') renderSongList(lastQ?SONGS.filter(s=>s.name.includes(lastQ)||s.artist.includes(lastQ)):SONGS,'search-list');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Init
renderArtistChips();
renderSongList(SONGS,'search-list');
renderFavList(); renderQueueFull(); renderQueuePreview();
</script>
