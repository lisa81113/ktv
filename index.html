<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行動KTV 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --gold-dark: #B8860B;
  --bg-dark: #0d0800;
  --bg-mid: #1e0e00;
  --bg-card: #2e1800;
  --text-bright: #fff8e7;
  --text-dim: #c8a96e;
  --accent: #ff6b35;
  --lyric-size: 2.6rem;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-dark); color: var(--text-bright); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #2a0800, #5a1800);
  border-bottom: 3px solid var(--gold);
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 3px 20px rgba(0,0,0,0.7);
}
.header-title { font-size: 1.8rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); letter-spacing: 3px; }
.header-title span { color: var(--accent); }

/* TABS */
.nav-tabs { display: flex; background: var(--bg-mid); border-bottom: 2px solid var(--gold-dark); }
.nav-tab { flex: 1; padding: 14px 6px; text-align: center; font-size: 1rem; font-weight: 700; color: var(--text-dim); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; user-select: none; }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(255,215,0,0.07); }

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* ══ KTV 畫面區 ══ */
.ktv-screen {
  background: #000;
  border-bottom: 3px solid var(--gold-dark);
  min-height: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.ktv-idle {
  width: 100%; padding: 30px 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 40% 60%, #1a003a 0%, #000 65%);
  gap: 10px; text-align: center;
}
.ktv-idle .mic { font-size: 4.5rem; }
.ktv-idle .idle-text { font-size: 1.2rem; color: var(--text-dim); }

/* Now Playing in screen */
.now-playing-screen {
  display: none;
  width: 100%; padding: 18px 20px;
  background: radial-gradient(ellipse at 30% 70%, #1a003a 0%, #000808 60%);
  flex-direction: column; align-items: center; gap: 10px;
}
.np-title-big {
  font-size: 1.6rem; font-weight: 900; color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
  letter-spacing: 3px; text-align: center;
}
.np-artist-big { font-size: 1rem; color: var(--text-dim); }
.disc-row { display: flex; align-items: center; gap: 16px; }
.disc {
  width: 56px; height: 56px; border-radius: 50%;
  background: conic-gradient(var(--gold), var(--accent), var(--gold-dark), var(--gold));
  display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
  animation: spin 3s linear infinite; animation-play-state: paused; flex-shrink: 0;
}
.disc.spin { animation-play-state: running; }
@keyframes spin { to { transform: rotate(360deg); } }

/* YouTube 開啟按鈕 */
.yt-open-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: linear-gradient(135deg, #cc0000, #ff0000);
  color: white; font-size: 1.1rem; font-weight: 900;
  padding: 14px 24px; border-radius: 14px; border: none;
  cursor: pointer; width: 100%; font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,0,0,0.4);
  letter-spacing: 1px; transition: all 0.15s;
}
.yt-open-btn:active { transform: scale(0.96); }
.yt-logo { font-size: 1.6rem; }

/* 歌詞區 */
.lyric-box {
  background: linear-gradient(180deg, #0d0400 0%, #1a0a00 100%);
  padding: 18px 16px 14px;
  min-height: 150px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-bottom: 2px solid var(--gold-dark);
}
.lyric-prev, .lyric-next {
  font-size: calc(var(--lyric-size) * 0.55);
  color: rgba(255,255,255,0.28); line-height: 1.6; text-align: center; min-height: 1.6em;
  transition: all 0.4s;
}
.lyric-curr {
  font-size: var(--lyric-size); font-weight: 900; color: var(--gold);
  text-align: center; line-height: 1.4;
  text-shadow: 0 0 30px rgba(255,215,0,0.9), 0 2px 8px rgba(0,0,0,0.9);
  margin: 10px 0; letter-spacing: 3px; min-height: 1.4em;
  transition: opacity 0.3s;
}
.lyric-progress { width: 90%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 12px; overflow: hidden; }
.lyric-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent)); border-radius: 3px; transition: width 0.5s linear; }
.lyric-counter { font-size: 0.75rem; color: rgba(255,255,255,0.2); margin-top: 5px; }

/* 控制區 */
.controls-area { padding: 12px 14px; background: var(--bg-mid); }
.ctrl-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.ctrl-btn { padding: 14px 6px; border: none; border-radius: 12px; font-family: inherit; font-weight: 700; font-size: 0.85rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.15s; user-select: none; }
.ctrl-btn:active { transform: scale(0.92); }
.ctrl-btn .ci { font-size: 1.5rem; }
.c-prev, .c-next { background: var(--bg-card); border: 1px solid var(--gold-dark); color: var(--gold); }
.c-pp { background: linear-gradient(135deg, var(--gold), #d4940a); color: #1a0a00; }
.c-stop { background: linear-gradient(135deg, #7a0000, #c0392b); color: #fff; }

/* 歌詞速度 */
.speed-row { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.speed-label { font-size: 0.9rem; color: var(--text-dim); flex-shrink: 0; }
.speed-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.speed-btn { padding: 8px 12px; border-radius: 8px; border: 2px solid var(--gold-dark); background: transparent; color: var(--gold); font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; }
.speed-btn.active { background: var(--gold); color: #1a0a00; border-color: var(--gold); }

/* 字體大小 */
.setting-row { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.setting-label { font-size: 0.9rem; color: var(--text-dim); flex-shrink: 0; }
.size-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.size-btn { padding: 8px 13px; border-radius: 8px; border: 2px solid var(--gold-dark); background: transparent; color: var(--gold); font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; }
.size-btn.active { background: var(--gold); color: #1a0a00; border-color: var(--gold); }

/* Section title */
.section-title { font-size: 1rem; font-weight: 700; color: var(--gold); margin: 10px 0 8px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content:''; flex:1; height:1px; background: var(--gold-dark); }

/* ══ SEARCH PANEL ══ */
#panel-search, #panel-fav, #panel-queue { padding: 14px; }
.search-row { display: flex; gap: 8px; margin-bottom: 14px; }
.search-input { flex: 1; padding: 14px; font-size: 1.1rem; font-family: inherit; background: var(--bg-card); border: 2px solid var(--gold-dark); border-radius: 12px; color: var(--text-bright); outline: none; }
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--text-dim); }
.btn { padding: 14px 18px; font-size: 1rem; font-family: inherit; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: all 0.15s; user-select: none; }
.btn:active { transform: scale(0.94); }
.btn-gold { background: linear-gradient(135deg, var(--gold), #d4940a); color: #1a0a00; }
.btn-red { background: linear-gradient(135deg, #8b0000, #c0392b); color: #fff; }
.btn-outline { background: transparent; border: 2px solid var(--gold-dark); color: var(--gold); }

.artist-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.artist-chip { padding: 9px 16px; background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 20px; font-size: 0.95rem; color: var(--text-dim); cursor: pointer; user-select: none; transition: all 0.15s; }
.artist-chip.active { background: var(--gold); color: #1a0a00; font-weight: 700; border-color: var(--gold); }

/* Song list */
.song-list { display: flex; flex-direction: column; gap: 10px; }
.song-item { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 14px; padding: 13px 14px; display: flex; align-items: center; gap: 10px; user-select: none; transition: all 0.15s; }
.song-item.playing { border-color: var(--gold); background: rgba(255,215,0,0.08); box-shadow: 0 0 16px rgba(255,215,0,0.2); }
.song-num { font-size: 0.95rem; color: var(--text-dim); min-width: 26px; text-align: center; font-weight: 700; }
.song-info { flex: 1; cursor: pointer; }
.song-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 3px; }
.song-artist { font-size: 0.9rem; color: var(--text-dim); }
.song-actions { display: flex; gap: 7px; }
.icon-btn { width: 42px; height: 42px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; transition: all 0.15s; }
.icon-btn:active { transform: scale(0.88); }
.fav-btn { background: rgba(255,80,80,0.15); color: #ff7777; }
.fav-btn.on { background: rgba(255,80,80,0.3); color: #ff2222; }
.add-btn { background: rgba(255,165,0,0.15); color: #ffa500; }
.play-btn { background: rgba(255,215,0,0.15); color: var(--gold); }

/* Queue */
.queue-item { background: var(--bg-card); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 12px 13px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.q-num { width: 28px; height: 28px; background: var(--gold); color: #1a0a00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; flex-shrink: 0; }

/* Empty */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 1.05rem; }
.empty-icon { font-size: 3rem; display: block; margin-bottom: 10px; }

/* Tips box */
.tips-box { background: rgba(255,215,0,0.07); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; font-size: 0.88rem; color: var(--text-dim); line-height: 1.7; }
.tips-box b { color: var(--gold); }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(255,215,0,0.97); color: #1a0a00; padding: 11px 24px; border-radius: 30px; font-size: 1rem; font-weight: 700; opacity: 0; transition: all 0.28s; z-index: 999; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🎤 行動<span>KTV</span></div>
  <div style="font-size:0.8rem;color:var(--text-dim);">老人家專用版</div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('play')">🎵 唱歌</div>
  <div class="nav-tab" onclick="switchTab('search')">🔍 搜尋</div>
  <div class="nav-tab" onclick="switchTab('fav')">❤️ 最愛</div>
  <div class="nav-tab" onclick="switchTab('queue')">📋 點歌</div>
</div>

<!-- ══ 唱歌 Panel ══ -->
<div class="panel active" id="panel-play">

  <!-- KTV 畫面 -->
  <div class="ktv-screen">
    <!-- 閒置狀態 -->
    <div class="ktv-idle" id="ktv-idle">
      <span class="mic">🎤</span>
      <div class="idle-text">請到「搜尋」選一首歌開始唱！</div>
    </div>
    <!-- 播放中狀態 -->
    <div class="now-playing-screen" id="now-playing-screen">
      <div class="disc-row">
        <div class="disc" id="main-disc">🎵</div>
        <div>
          <div class="np-title-big" id="np-title-big">-</div>
          <div class="np-artist-big" id="np-artist-big">-</div>
        </div>
      </div>
      <!-- YouTube 開啟按鈕 -->
      <button class="yt-open-btn" id="yt-open-btn" onclick="openYouTube()">
        <span class="yt-logo">▶️</span>
        點這裡開啟 YouTube 伴唱帶（有聲音）
      </button>
    </div>
  </div>

  <!-- 歌詞 -->
  <div class="lyric-box">
    <div class="lyric-prev" id="lyric-prev"></div>
    <div class="lyric-curr" id="lyric-curr" style="color:var(--text-dim);font-size:1.4rem;">請先選一首歌 🎶</div>
    <div class="lyric-next" id="lyric-next"></div>
    <div class="lyric-progress" id="lyric-progress" style="display:none">
      <div class="lyric-fill" id="lyric-fill" style="width:0%"></div>
    </div>
    <div class="lyric-counter" id="lyric-counter"></div>
  </div>

  <!-- 控制 -->
  <div class="controls-area">
    <div class="ctrl-row">
      <button class="ctrl-btn c-prev" onclick="playPrev()"><span class="ci">⏮</span>上一首</button>
      <button class="ctrl-btn c-pp" id="pp-btn" onclick="togglePause()"><span class="ci" id="pp-icon">⏸</span><span id="pp-label">暫停詞</span></button>
      <button class="ctrl-btn c-next" onclick="playNext()"><span class="ci">⏭</span>下一首</button>
      <button class="ctrl-btn c-stop" onclick="stopSong()"><span class="ci">⏹</span>停止</button>
    </div>

    <!-- 提示 -->
    <div class="tips-box">
      💡 <b>使用方式：</b>選好歌後，按上方紅色按鈕開啟 YouTube 伴唱帶，<b>回到本頁</b>讓歌詞繼續跑字，邊看 YouTube 邊對這裡的歌詞唱歌！
    </div>

    <!-- 歌詞速度 -->
    <div class="speed-row">
      <span class="speed-label">⏱ 歌詞速度</span>
      <div class="speed-btns">
        <button class="speed-btn" onclick="setSpeed(4000)">慢</button>
        <button class="speed-btn active" onclick="setSpeed(2800)">正常</button>
        <button class="speed-btn" onclick="setSpeed(2000)">快</button>
      </div>
    </div>

    <!-- 字體大小 -->
    <div class="setting-row">
      <span class="setting-label">🔤 歌詞大小</span>
      <div class="size-btns">
        <button class="size-btn" onclick="setSize('1.8rem')">小</button>
        <button class="size-btn active" onclick="setSize('2.6rem')">中</button>
        <button class="size-btn" onclick="setSize('3.4rem')">大</button>
        <button class="size-btn" onclick="setSize('4.2rem')">特大</button>
      </div>
    </div>

    <!-- 待唱歌單 -->
    <div class="section-title">📋 待唱歌單</div>
    <div id="queue-preview-area"></div>
  </div>
</div>

<!-- ══ 搜尋 Panel ══ -->
<div class="panel" id="panel-search">
  <div class="section-title">🔍 輸入歌名或歌手</div>
  <div class="search-row">
    <input class="search-input" id="search-input" type="text" placeholder="輸入歌名或歌手名稱..." oninput="doSearch()">
    <button class="btn btn-gold" onclick="doSearch()">搜尋</button>
  </div>
  <div class="section-title">🎤 快速選歌手</div>
  <div class="artist-chips" id="artist-chips"></div>
  <div class="section-title">🎵 歌曲列表</div>
  <div class="song-list" id="search-list"></div>
</div>

<!-- ══ 最愛 Panel ══ -->
<div class="panel" id="panel-fav">
  <div class="section-title">❤️ 我的最愛歌單</div>
  <div class="song-list" id="fav-list"></div>
</div>

<!-- ══ 點歌 Panel ══ -->
<div class="panel" id="panel-queue">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div class="section-title" style="margin:0;flex:1;">📋 點歌列表</div>
    <button class="btn btn-red" onclick="clearQueue()" style="padding:9px 14px;font-size:0.9rem;">清空</button>
  </div>
  <div id="queue-full-list"></div>
</div>

<div class="toast" id="toast"></div>

  },
  {
    id:14, name:'恰似你的溫柔', artist:'蔡琴', lang:'國語',
    ytSearch:'恰似你的溫柔 蔡琴 伴唱 karaoke',
    ytId:'',
    lyrics:['某年某月的某一天','就像一張破碎的臉','難以開口道再見','就讓一切走遠',
      '這不是件容易的事','我們卻都沒有哭泣','讓它淡淡地來','讓它好好地去'],
    lyricMs:[5000,9000,14000,18000,24000,28000,33000,37000]
  },
  {
    id:15, name:'夜來香', artist:'鄧麗君', lang:'國語',
    ytSearch:'夜來香 鄧麗君 伴唱 karaoke',
    ytId:'',
    lyrics:['那南風吹來清涼','那夜鶯啼聲細唱','月下的花兒都入夢',
      '只有那夜來香','吐露著芬芳','夜來香','我為你歌唱','夜來香','我為你思量'],
    lyricMs:[5000,9000,13000,18000,22000,26000,30000,34000,38000]
  },
];

const ARTISTS = ['鄧麗君','葉啟田','伍佰','洪一峰','文夏','洪榮宏','尤雅','紫薇','蔡琴'];

// ── State ──
let queue = [];
let favorites = [];
try { favorites = JSON.parse(localStorage.getItem('ktv_fav3') || '[]'); } catch(e){}
let currentSong = null;
let isPlaying = false;
let lyricTimer = null;
let lyricIdx = 0;
let songStartTime = 0;
let lyricSpeed = 2800;
let isPaused = false;
let pausedAt = 0;

// ── Play ──
function playSong(id) {
  const song = SONGS.find(s => s.id === id);
  if (!song) return;
  if (lyricTimer) { clearInterval(lyricTimer); lyricTimer = null; }

  currentSong = song;
  lyricIdx = 0;
  isPaused = false;
  isPlaying = true;

  // Show now playing screen
  document.getElementById('ktv-idle').style.display = 'none';
  document.getElementById('now-playing-screen').style.display = 'flex';
  document.getElementById('np-title-big').textContent = song.name;
  document.getElementById('np-artist-big').textContent = song.artist + ' · ' + song.lang;
  document.getElementById('main-disc').classList.add('spin');
  document.getElementById('lyric-progress').style.display = 'block';

  // pp button
  document.getElementById('pp-icon').textContent = '⏸';
  document.getElementById('pp-label').textContent = '暫停詞';

  renderLyric();
  startLyricTimer();
  switchTab('play');
  showToast('🎵 ' + song.name + ' — 按紅色按鈕開 YouTube！');
}

function openYouTube() {
  if (!currentSong) return;
  // Try direct video first, fallback to search
  const ytId = currentSong.ytId;
  let url;
  if (ytId) {
    // Try YouTube app deep link first, fallback to web
    url = 'https://www.youtube.com/watch?v=' + ytId;
  } else {
    url = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(currentSong.ytSearch);
  }
  window.open(url, '_blank');
  showToast('▶ 已開啟 YouTube！');
}

function startLyricTimer() {
  if (lyricTimer) clearInterval(lyricTimer);
  songStartTime = Date.now() - (pausedAt || 0);
  lyricTimer = setInterval(() => {
    if (isPaused || !currentSong) return;
    const elapsed = Date.now() - songStartTime;
    let idx = 0;
    for (let i = 0; i < currentSong.lyricMs.length; i++) {
      if (elapsed >= currentSong.lyricMs[i]) idx = i;
    }
    if (idx !== lyricIdx) { lyricIdx = idx; renderLyric(); }
    // End of song
    if (elapsed > (currentSong.lyricMs[currentSong.lyricMs.length-1] + lyricSpeed)) {
      if (queue.length > 0) { clearInterval(lyricTimer); setTimeout(playNext, 1200); }
    }
  }, 250);
}

function renderLyric() {
  if (!currentSong) return;
  const L = currentSong.lyrics;
  const i = Math.min(lyricIdx, L.length - 1);
  document.getElementById('lyric-prev').textContent = i > 0 ? L[i-1] : '';
  const curr = document.getElementById('lyric-curr');
  curr.textContent = L[i] || '';
  curr.style.color = 'var(--gold)';
  curr.style.fontSize = 'var(--lyric-size)';
  document.getElementById('lyric-next').textContent = i < L.length-1 ? L[i+1] : '';
  document.getElementById('lyric-fill').style.width = Math.round(((i+1)/L.length)*100) + '%';
  document.getElementById('lyric-counter').textContent = (i+1) + ' / ' + L.length + ' 句';
}

function togglePause() {
  if (!currentSong) { showToast('請先選擇一首歌！'); return; }
  isPaused = !isPaused;
  if (isPaused) {
    pausedAt = Date.now() - songStartTime;
    document.getElementById('main-disc').classList.remove('spin');
    document.getElementById('pp-icon').textContent = '▶';
    document.getElementById('pp-label').textContent = '繼續詞';
    showToast('⏸ 歌詞暫停');
  } else {
    songStartTime = Date.now() - pausedAt;
    document.getElementById('main-disc').classList.add('spin');
    document.getElementById('pp-icon').textContent = '⏸';
    document.getElementById('pp-label').textContent = '暫停詞';
    showToast('▶ 歌詞繼續');
  }
}

function stopSong() {
  if (lyricTimer) { clearInterval(lyricTimer); lyricTimer = null; }
  currentSong = null; isPlaying = false; isPaused = false; lyricIdx = 0; pausedAt = 0;
  document.getElementById('ktv-idle').style.display = 'flex';
  document.getElementById('now-playing-screen').style.display = 'none';
  document.getElementById('main-disc').classList.remove('spin');
  const curr = document.getElementById('lyric-curr');
  curr.textContent = '請先選一首歌 🎶';
  curr.style.color = 'var(--text-dim)'; curr.style.fontSize = '1.4rem';
  document.getElementById('lyric-prev').textContent = '';
  document.getElementById('lyric-next').textContent = '';
  document.getElementById('lyric-fill').style.width = '0%';
  document.getElementById('lyric-counter').textContent = '';
  document.getElementById('lyric-progress').style.display = 'none';
  document.getElementById('pp-icon').textContent = '⏸';
  document.getElementById('pp-label').textContent = '暫停詞';
  showToast('⏹ 已停止');
}

function playNext() {
  if (queue.length > 0) {
    const nxt = queue.shift(); renderQueueFull(); renderQueuePreview(); playSong(nxt.id);
  } else if (currentSong) {
    const idx = SONGS.findIndex(s => s.id === currentSong.id);
    playSong(SONGS[(idx+1) % SONGS.length].id);
  }
}
function playPrev() {
  if (currentSong) {
    const idx = SONGS.findIndex(s => s.id === currentSong.id);
    playSong(SONGS[(idx-1+SONGS.length) % SONGS.length].id);
  }
}

// ── Speed / Size ──
function setSpeed(ms) {
  lyricSpeed = ms;
  document.querySelectorAll('.speed-btn').forEach((b,i) => {
    b.classList.toggle('active', [4000,2800,2000][i] === ms);
  });
  showToast('歌詞速度已調整');
}
function setSize(sz) {
  document.documentElement.style.setProperty('--lyric-size', sz);
  document.querySelectorAll('.size-btn').forEach((b,i) => {
    b.classList.toggle('active', ['1.8rem','2.6rem','3.4rem','4.2rem'][i] === sz);
  });
  if (currentSong) renderLyric();
}

// ── Favorites ──
function toggleFav(id) {
  if (favorites.includes(id)) { favorites = favorites.filter(f=>f!==id); showToast('已移除最愛'); }
  else { favorites.push(id); showToast('❤️ 已加入最愛！'); }
  try { localStorage.setItem('ktv_fav3', JSON.stringify(favorites)); } catch(e){}
  renderFavList();
  doSearch();
}

// ── Queue ──
function addToQueue(id) {
  const song = SONGS.find(s=>s.id===id); if (!song) return;
  if (queue.find(s=>s.id===id)) { showToast('已在點歌列表中'); return; }
  queue.push(song); renderQueueFull(); renderQueuePreview();
  showToast('➕ 已加入：' + song.name);
}
function removeQueue(i) { queue.splice(i,1); renderQueueFull(); renderQueuePreview(); }
function clearQueue() { queue=[]; renderQueueFull(); renderQueuePreview(); showToast('已清空點歌列表'); }

// ── Render ──
function songItemHTML(s, num) {
  const isFav = favorites.includes(s.id);
  const isNP = currentSong && currentSong.id === s.id;
  return `<div class="song-item ${isNP?'playing':''}">
    <div class="song-num">${isNP?'🎵':num}</div>
    <div class="song-info" onclick="playSong(${s.id})">
      <div class="song-name">${s.name}</div>
      <div class="song-artist">${s.artist} · ${s.lang}</div>
    </div>
    <div class="song-actions">
      <button class="icon-btn fav-btn ${isFav?'on':''}" onclick="toggleFav(${s.id})">${isFav?'❤️':'🤍'}</button>
      <button class="icon-btn add-btn" onclick="addToQueue(${s.id})">➕</button>
      <button class="icon-btn play-btn" onclick="playSong(${s.id})">▶</button>
    </div>
  </div>`;
}
function renderSongList(songs, elId) {
  document.getElementById(elId).innerHTML = songs.length
    ? songs.map((s,i)=>songItemHTML(s,i+1)).join('')
    : '<div class="empty-state"><span class="empty-icon">😔</span>找不到相關歌曲</div>';
}
function renderFavList() {
  const favS = SONGS.filter(s=>favorites.includes(s.id));
  document.getElementById('fav-list').innerHTML = favS.length
    ? favS.map((s,i)=>songItemHTML(s,i+1)).join('')
    : '<div class="empty-state"><span class="empty-icon">💝</span>還沒有最愛歌曲<br>按歌曲旁的 🤍 加入！</div>';
}
function renderQueueFull() {
  document.getElementById('queue-full-list').innerHTML = queue.length
    ? queue.map((s,i)=>`<div class="queue-item">
        <div class="q-num">${i+1}</div>
        <div class="song-info"><div class="song-name">${s.name}</div><div class="song-artist">${s.artist}</div></div>
        <button class="icon-btn" style="background:rgba(200,0,0,0.15);color:#ff6666;" onclick="removeQueue(${i})">✕</button>
      </div>`).join('')
    : '<div class="empty-state"><span class="empty-icon">🎶</span>點歌列表是空的<br>去搜尋歌曲並按 ➕ 加入！</div>';
}
function renderQueuePreview() {
  const el = document.getElementById('queue-preview-area');
  if (!queue.length) { el.innerHTML = '<div style="color:var(--text-dim);font-size:0.9rem;text-align:center;padding:8px;">點歌列表是空的</div>'; return; }
  el.innerHTML = queue.slice(0,3).map((s,i)=>`<div class="queue-item">
    <div class="q-num">${i+1}</div>
    <div class="song-info"><div class="song-name">${s.name}</div><div class="song-artist">${s.artist}</div></div>
  </div>`).join('') + (queue.length>3?`<div style="text-align:center;color:var(--text-dim);font-size:0.85rem;padding:6px;">還有 ${queue.length-3} 首...</div>`:'');
}
function renderArtistChips() {
  document.getElementById('artist-chips').innerHTML = ARTISTS.map(a=>
    `<div class="artist-chip" onclick="filterArtist('${a}')">${a}</div>`).join('');
}
function filterArtist(a) {
  document.querySelectorAll('.artist-chip').forEach(c=>c.classList.toggle('active',c.textContent===a));
  document.getElementById('search-input').value = a;
  renderSongList(SONGS.filter(s=>s.artist===a),'search-list');
}
let lastQ='';
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  lastQ = q;
  document.querySelectorAll('.artist-chip').forEach(c=>c.classList.remove('active'));
  renderSongList(q?SONGS.filter(s=>s.name.includes(q)||s.artist.includes(q)):SONGS,'search-list');
}
function switchTab(tab) {
  ['play','search','fav','queue'].forEach((t,i)=>{
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='fav') renderFavList();
  if(tab==='queue') renderQueueFull();
  if(tab==='search') renderSongList(lastQ?SONGS.filter(s=>s.name.includes(lastQ)||s.artist.includes(lastQ)):SONGS,'search-list');
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Init
renderArtistChips();
renderSongList(SONGS,'search-list');
renderFavList();
renderQueueFull();
renderQueuePreview();
</script>
